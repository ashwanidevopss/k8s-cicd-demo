name: Build and Deploy to Kubernetes with Monitoring

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/k8s-cicd-demo
  K8S_NAMESPACE: production
  MONITORING_NAMESPACE: monitoring

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Run tests
        working-directory: ./app
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

  deploy-monitoring:
    needs: build-and-test
    runs-on: Self-Hosted 
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Check if monitoring namespace exists
        id: check_monitoring
        run: |
          if kubectl get namespace ${{ env.MONITORING_NAMESPACE }} &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Test kubectl connection
        run: |
          echo "🔍 Testing kubectl connection..."
          kubectl cluster-info
          kubectl get nodes
      
      - name: Deploy Prometheus and Grafana
        run: |
          echo "📊 Deploying monitoring stack..."
          kubectl apply -f monitoring/prometheus-grafana-setup.yaml --validate=false
          
          echo "⏳ Waiting for Prometheus to be ready..."
          kubectl wait --for=condition=ready pod -l app=prometheus -n ${{ env.MONITORING_NAMESPACE }} --timeout=300s || true
          
          echo "⏳ Waiting for Grafana to be ready..."
          kubectl wait --for=condition=ready pod -l app=grafana -n ${{ env.MONITORING_NAMESPACE }} --timeout=300s || true

      - name: Verify monitoring deployment
        run: |
          echo "✅ Monitoring Stack Status:"
          kubectl get pods -n ${{ env.MONITORING_NAMESPACE }}
          kubectl get svc -n ${{ env.MONITORING_NAMESPACE }}
          
          echo ""
          echo "📊 Prometheus URL: http://$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}'):30090"
          echo "📈 Grafana URL: http://$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}'):30030"

  deploy-application:
    needs: deploy-monitoring
    runs-on: Self-Hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Check if deployment exists
        id: check_deployment
        run: |
          if kubectl get deployment k8s-cicd-demo -n ${{ env.K8S_NAMESPACE }} &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create or update deployment
        run: |
          if [ "${{ steps.check_deployment.outputs.exists }}" == "true" ]; then
            echo "🚀 Updating existing deployment..."
            kubectl set image deployment/k8s-cicd-demo \
              k8s-cicd-demo=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
              -n ${{ env.K8S_NAMESPACE }}
          else
            echo "🚀 Creating new deployment..."
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/deployment.yaml
            kubectl apply -f k8s/service.yaml
            kubectl set image deployment/k8s-cicd-demo \
              k8s-cicd-demo=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
              -n ${{ env.K8S_NAMESPACE }}
          fi

      - name: Wait for rollout
        run: |
          echo "⏳ Waiting for deployment to complete..."
          kubectl rollout status deployment/k8s-cicd-demo \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      - name: Verify deployment
        run: |
          echo "✅ Application Status:"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -l app=k8s-cicd-demo
          kubectl get svc -n ${{ env.K8S_NAMESPACE }} k8s-cicd-demo

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          SERVICE_IP=$(kubectl get svc k8s-cicd-demo -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -z "$SERVICE_IP" ]; then
            SERVICE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[0].address}')
            SERVICE_PORT=$(kubectl get svc k8s-cicd-demo -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.ports[0].nodePort}')
          else
            SERVICE_PORT=80
          fi
          echo "Testing http://$SERVICE_IP:$SERVICE_PORT"
          curl -f http://$SERVICE_IP:$SERVICE_PORT/health || exit 1
          echo "✅ Smoke tests passed!"

      - name: Send success email notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: true
          username: ${{ secrets.EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Capstone Deployment Successful - ${{ github.repository }}"
          to: ${{ secrets.EMAIL }}
          from: DevOps CI/CD <${{ secrets.EMAIL }}>
          html_body: |
            <h2>🚀 Capstone Project Deployment Successful!</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Branch:</strong> ${{ github.ref }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Author:</strong> ${{ github.actor }}</p>
            <p><strong>Commit Message:</strong> ${{ github.event.head_commit.message }}</p>
            <hr>
            <h3>📦 Deployed Components:</h3>
            <ul>
              <li>✅ Application: k8s-cicd-demo (namespace: production)</li>
              <li>✅ Prometheus (namespace: monitoring)</li>
              <li>✅ Grafana (namespace: monitoring)</li>
            </ul>
            <h3>🔗 Access URLs:</h3>
            <ul>
              <li><strong>Application:</strong> http://NODE_IP:30100</li>
              <li><strong>Prometheus:</strong> http://NODE_IP:30090</li>
              <li><strong>Grafana:</strong> http://NODE_IP:30030 (admin/admin)</li>
            </ul>
            <h3>📊 Deployment Status:</h3>
            <ul>
              <li>Tests: Passed ✅</li>
              <li>Docker Build: Success ✅</li>
              <li>Monitoring Stack: Deployed ✅</li>
              <li>Application: Deployed ✅</li>
              <li>Smoke Tests: Passed ✅</li>
            </ul>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Deployment Logs</a></p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}">View Commit</a></p>

      - name: Send failure email notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: true
          username: ${{ secrets.EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Capstone Deployment Failed - ${{ github.repository }}"
          to: ${{ secrets.EMAIL }}
          from: DevOps CI/CD <${{ secrets.EMAIL }}>
          html_body: |
            <h2>⚠️ Capstone Deployment Failed!</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Branch:</strong> ${{ github.ref }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Author:</strong> ${{ github.actor }}</p>
            <p><strong>Commit Message:</strong> ${{ github.event.head_commit.message }}</p>
            <hr>
            <p><strong>Status:</strong> FAILED ❌</p>
            <p>Please check the logs and take immediate action.</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Failure Logs</a></p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}">View Commit</a></p>

  rollback:
    needs: deploy-application
    runs-on: Self-Hosted 
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Rollback deployment
        run: |
          echo "🔄 Rolling back deployment..."
          kubectl rollout undo deployment/k8s-cicd-demo -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/k8s-cicd-demo -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          echo "✅ Rollback completed!"

      - name: Send rollback email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: true
          username: ${{ secrets.EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🔄 Automatic Rollback Executed - ${{ github.repository }}"
          to: ${{ secrets.EMAIL }}
          from: DevOps CI/CD <${{ secrets.EMAIL }}>
          html_body: |
            <h2>🔄 Automatic Rollback Executed</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Branch:</strong> ${{ github.ref }}</p>
            <p><strong>Failed Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Author:</strong> ${{ github.actor }}</p>
            <hr>
            <p><strong>Reason:</strong> Deployment failed validation</p>
            <p><strong>Action Taken:</strong> Rolled back to previous stable version</p>
            <p>The application has been restored to its previous working state.</p>
            <p>Monitoring stack (Prometheus & Grafana) remains operational.</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Rollback Details</a></p>

